apiVersion: batch/v1
kind: CronJob
metadata:
  name: taskqueue-reaper
spec:
  # Every minute — Kubernetes CronJob's finest granularity. A stuck job
  # therefore waits at most ~1 minute past lease expiry before reclaim.
  schedule: "* * * * *"
  concurrencyPolicy: Forbid           # don't overlap if a run is slow
  successfulJobsHistoryLimit: 3       # keep recent successes for `kubectl logs`
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 30         # skip a tick if the controller is delayed
  jobTemplate:
    spec:
      backoffLimit: 1                 # one retry on failure, then give up
      template:
        metadata:
          labels:
            app: taskqueue-reaper
        spec:
          restartPolicy: OnFailure
          containers:
            - name: reaper
              image: taskqueue:latest
              imagePullPolicy: Never  # use the image built into minikube's daemon
              env:
                - name: ROLE
                  value: reaper
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: DATABASE_URL
